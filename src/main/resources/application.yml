spring:
  application:
    name: saas-app
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}


  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saas-app-db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:5}
      idle-timeout: ${DB_IDLE_TIMEOUT:30000}
      max-lifetime: ${DB_MAX_LIFETIME:1200000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:20000}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
            batch_size: 20
        order_inserts: true
        order_updates: true
        multi_tenancy: SCHEMA
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/common
    schemas:
      - public
    table: flyway_schema_version
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:certs/private_key.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:certs/public_key.pem}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}

springdoc:
  default-produces-media-type: application/json
  swagger-ui:
    enabled: true
    operations-sorter: true
    tags-sorter: alpha

  
    